<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BilleteSeguro BOB</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="app_icon_v20.png">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="BilleteBOB">
    <link rel="apple-touch-icon" href="app_icon_v20.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface-glass: rgba(10, 10, 10, 0.4);
            --text: #ffffff;
            --text-secondary: #a0a0a0;
            --error: #ff4d4d;
            --info: #00f3ff;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000 url('bg_final.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        /* 1. Logo Space */
        .header {
            padding: 185px 20px 20px; z-index: 100;
        }

        /* 2. Scanner Viewbox */
        #scanner-container {
            flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 10;
        }

        .scanner-viewbox {
            width: 300px; height: 300px; position: relative; border-radius: 20px; overflow: hidden;
            background: #000; border: 2px solid rgba(0, 243, 255, 0.4); box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
        }

        video { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block; }

        @keyframes scanSlide {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(300px); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(0); opacity: 0; }
        }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary);
            box-shadow: 0 0 30px var(--primary); z-index: 25; animation: scanSlide 2.5s ease-in-out infinite;
        }

        .scan-badge {
            margin-top: 25px; background: rgba(0, 0, 0, 0.7); padding: 12px 25px; border-radius: 20px;
            border: 1px solid var(--primary); text-align: center; width: 280px;
        }

        .scan-badge p { color: var(--primary); font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        /* 3. Denomination Selector */
        .btn-denom {
            background: rgba(0, 243, 255, 0.05); color: var(--primary); border: 2px solid rgba(0, 243, 255, 0.3);
            padding: 14px; border-radius: 12px; font-weight: 900; font-size: 14px; cursor: pointer; flex: 1; transition: all 0.3s;
        }

        .btn-denom.active {
            background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 243, 255, 0.5);
        }

        /* 4. Navbar with Original Icons */
        .navbar {
            height: 100px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 35px; z-index: 1000;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-secondary); cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon svg { width: 26px; height: 26px; stroke-width: 2.5; }
        .nav-label { font-size: 9px; font-weight: 800; text-transform: uppercase; }

        /* 5. Result Panel (Neon Style) */
        #result-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #0c0c0c;
            padding: 30px 25px 100px; border-top: 3px solid var(--primary); border-top-left-radius: 30px; border-top-right-radius: 30px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1500;
            box-shadow: 0 -20px 60px rgba(0, 0, 0, 1);
        }

        #result-panel.active { transform: translateY(0); }
        .btn-primary { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 900; width: 100%; cursor: pointer; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000;
            display: none; flex-direction: column; padding: 25px; overflow-y: auto;
        }
        .modal.active { display: flex; }
        .card { background: #151515; border-radius: 18px; padding: 20px; border: 1px solid #333; margin-bottom: 16px; }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="series_db.js"></script>
</head>

<body>
    <div class="header"></div>

    <div id="scanner-container">
        <div class="scanner-viewbox">
            <video id="video" playsinline autoplay muted></video>
            <div class="scan-line"></div>
        </div>

        <div id="denom-selector" style="display: flex; gap: 10px; width: 300px; margin: 25px 0;">
            <button class="btn-denom active" onclick="setDenom('auto', this)">AUTO</button>
            <button class="btn-denom" onclick="setDenom('10', this)">10 Bs</button>
            <button class="btn-denom" onclick="setDenom('20', this)">20 Bs</button>
            <button class="btn-denom" onclick="setDenom('50', this)">50 Bs</button>
        </div>

        <div class="scan-badge">
            <p id="status-label">CARGANDO IA...</p>
        </div>
    </div>

    <!-- NavBar (Icons Restored) -->
    <nav class="navbar">
        <div class="nav-item active" onclick="location.reload()">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
            </div>
            <div class="nav-label">ESCANEAR</div>
        </div>
        <div class="nav-item" onclick="toggleModal('history-modal')">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div class="nav-label">HISTORIAL</div>
        </div>
        <div class="nav-item" onclick="document.getElementById('ocr-upload').click()">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <div class="nav-label">SUBIR FOTO</div>
        </div>
        <input type="file" id="ocr-upload" accept="image/*" style="display: none;" onchange="handleOCRUpload(event)">
    </nav>

    <!-- Modals -->
    <div id="history-modal" class="modal">
        <h2 style="margin-bottom: 25px; color: var(--primary);">Historial de Rechazos</h2>
        <div id="history-list"></div>
        <button onclick="toggleModal('history-modal')" class="btn-primary" style="margin-top: auto;">CERRAR</button>
    </div>

    <!-- Result Panel (Premium Neon) -->
    <div id="result-panel">
        <p style="font-size: 11px; color: var(--text-secondary); text-transform: uppercase;">Estado del Billete</p>
        <h3 id="result-status" style="font-size: 28px; font-weight: 800; margin-bottom: 12px;">ESTADO</h3>
        <p id="result-reason" style="margin-bottom: 25px; color: #fff; font-size: 14px; font-weight: 600;"></p>
        <button onclick="closeResult()" class="btn-primary">CONTINUAR ESCANEANDO</button>
    </div>

    <script>
        let ocrWorker = null;
        let isProcessing = false;
        let selectedDenom = 'auto';
        let lastResultId = 0;
        let rejectedNotes = JSON.parse(localStorage.getItem('rejected_notes')) || [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); if (id === 'history-modal') renderHistory(); }
        function closeResult() { document.getElementById('result-panel').classList.remove('active'); }
        function setDenom(val, btn) { 
            selectedDenom = val; 
            document.querySelectorAll('.btn-denom').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
        }

        async function initOCR() {
            try {
                document.getElementById('status-label').innerText = "INICIANDO MOTOR...";
                ocrWorker = await Tesseract.createWorker('eng', 1);
                await ocrWorker.setParameters({ tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ', tessedit_pageseg_mode: '7' });
                document.getElementById('status-label').innerText = "APUNTA AL BILLETE";
            } catch (err) {
                document.getElementById('status-label').innerText = "ERROR IA: RECONECTA";
            }
        }

        async function startScanner() {
            const video = document.getElementById('video');
            try {
                document.getElementById('status-label').innerText = "REVISANDO CÁMARA...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                requestAnimationFrame(() => processLoop(video, canvas, ctx));
            } catch (err) {
                document.getElementById('status-label').innerText = "CÁMARA BLOQUEADA";
            }
        }

        async function processLoop(video, canvas, ctx) {
            if (isProcessing || !ocrWorker) {
                requestAnimationFrame(() => processLoop(video, canvas, ctx));
                return;
            }
            canvas.width = 400; canvas.height = 400;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            isProcessing = true;
            try {
                const { data: { text } } = await ocrWorker.recognize(canvas.toDataURL('image/jpeg', 0.5));
                if (text) parseText(text);
                setTimeout(() => { isProcessing = false; requestAnimationFrame(() => processLoop(video, canvas, ctx)); }, 800);
            } catch (err) {
                isProcessing = false;
                requestAnimationFrame(() => processLoop(video, canvas, ctx));
            }
        }

        function parseText(text) {
            const m = text.match(/\b(\d{8,9})\s*([A-C])\b/i);
            if (m) {
                const serial = m[1];
                const series = m[2].toUpperCase();
                const res = validateBolivianBill(series, selectedDenom, serial);
                
                if (res.status === "INHABILITADO") {
                    if (Date.now() - lastResultId > 4000) {
                        lastResultId = Date.now();
                        showResult(res.status, res.color, res.reason);
                        rejectedNotes.unshift({ status: res.status, reason: res.reason, qr: `SERIE: ${series} ${serial}`, date: new Date().toLocaleString() });
                        localStorage.setItem('rejected_notes', JSON.stringify(rejectedNotes));
                        if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                    }
                }
            }
        }

        function showResult(status, color, reason) {
            const panel = document.getElementById('result-panel');
            document.getElementById('result-status').innerText = status;
            document.getElementById('result-status').style.color = color;
            document.getElementById('result-reason').innerText = reason;
            panel.classList.add('active');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = rejectedNotes.map(n => `
                <div class="card" style="border-left: 5px solid red;">
                    <p style="color:red; font-weight:800; font-size:14px;">${n.status}</p>
                    <p style="font-size:13px; margin: 8px 0;">${n.reason}</p>
                    <p style="font-size:10px; color:#aaa;">${n.qr} | ${n.date}</p>
                </div>
            `).join('') || '<p style="text-align:center; padding:50px; color:#555;">No hay nada en el historial.</p>';
        }

        async function handleOCRUpload(event) {
            const file = event.target.files[0];
            if (!file || !ocrWorker) return;
            document.getElementById('status-label').innerText = "ANALIZANDO FOTO...";
            const img = new Image();
            img.onload = async () => {
                const c = document.createElement('canvas');
                c.width = 1000; c.height = (img.height/img.width)*1000;
                c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
                const { data: { text } } = await ocrWorker.recognize(c.toDataURL('image/jpeg', 0.8));
                
                const m = text.match(/\b(\d{8,9})\s*([A-C])\b/i);
                if (m) {
                    const res = validateBolivianBill(m[2].toUpperCase(), selectedDenom, m[1]);
                    showResult(res.status, res.color, res.reason);
                } else {
                    alert("No se detectó número de serie. Intenta una foto más clara.");
                }
                document.getElementById('status-label').innerText = "APUNTA AL BILLETE";
            };
            img.src = URL.createObjectURL(file);
        }

        window.onload = () => { initOCR(); startScanner(); };
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    </script>
</body>
</html>
