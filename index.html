<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilleteSeguro BOB</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface-glass: rgba(10, 10, 10, 0.7);
            --text: #ffffff;
            --text-secondary: #a0a0a0;
            --error: #ff4d4d;
            --info: #00f3ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('bg_live.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 1. Header Section - Clean and Centered */
        .header {
            padding: 40px 20px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }

        .logo-img {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.4));
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        /* 2. Scanner Container - Perfectly Proportioned */
        #scanner-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .scanner-viewbox {
            width: 280px;
            height: 280px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Scan Line Animation - Clean Minimalist */
        @keyframes scanSlide {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(280px); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(0); opacity: 0; }
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #00f3ff;
            box-shadow: 0 0 20px #00f3ff, 0 0 40px #00f3ff;
            z-index: 20;
            animation: scanSlide 3s ease-in-out infinite;
        }

        .scan-badge {
            margin-top: 25px;
            background: var(--surface-glass);
            backdrop-filter: blur(10px);
            padding: 8px 24px;
            border-radius: 20px;
            border: 1px solid rgba(0, 243, 255, 0.2);
        }

        .scan-badge p {
            color: var(--primary);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 3. Bottom Navbar - Professional Proportions */
        .navbar {
            height: 85px;
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 15px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon svg {
            width: 30px;
            height: 30px;
            stroke-width: 2;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Modals & Result Views */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .modal.active { display: flex; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: 20px;
        }

        #result-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--surface);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 24px 24px 100px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1500;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
        }

        #result-panel.active { transform: translateY(0); }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 16px;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
        }

        #reader__dashboard { display: none !important; }
    </style>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body>

    <div class="header">
        <img src="logo_full.png" class="logo-img" alt="BilleteSeguro">
        <h1>BilleteSeguro BOB</h1>
    </div>

    <div id="scanner-container">
        <div class="scanner-viewbox">
            <div id="reader"></div>
            <div class="scan-line"></div>
        </div>

        <div class="scan-badge">
            <p id="status-label">Escaneando...</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-item" onclick="toggleModal('history-modal')">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
            <div class="nav-label">Historial</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"></rect>
                    <path d="M7 11V7a5 5 0 0110 0v4" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
            <div class="nav-label">Escanear</div>
        </div>
        <div class="nav-item" onclick="toggleModal('support-modal')">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 16v-4m0-4h.01" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
            <div class="nav-label">Soporte</div>
        </div>
    </nav>

    <!-- History Modal -->
    <div id="history-modal" class="modal">
        <div class="modal-header">
            <h2>Historial Inhabilitados</h2>
            <div onclick="toggleModal('history-modal')" style="color: var(--primary); font-weight: 700;">CERRAR</div>
        </div>
        <div id="history-list"></div>
    </div>

    <!-- Support Modal -->
    <div id="support-modal" class="modal">
        <div class="modal-header">
            <h2>Soporte</h2>
            <div onclick="toggleModal('support-modal')" style="color: var(--primary); font-weight: 700;">CERRAR</div>
        </div>
        <div class="card" style="text-align: center;">
            <p style="color: var(--primary); font-weight: 800; font-size: 12px; margin-bottom: 20px;">AYUDA AL CREADOR</p>
            <div style="background: white; padding: 10px; border-radius: 12px; display: inline-block;">
                <img src="qr_apoyo.jpg" style="width: 200px; height: 200px; object-fit: contain;">
            </div>
        </div>
        <form action="https://formspree.io/f/xvgzgeyw" method="POST" class="card">
            <div style="margin-bottom: 12px;">
                <input type="email" name="email" placeholder="Tu Correo" style="width:100%; padding:12px; background:#252525; border:1px solid #333; border-radius:10px; color:white;" required>
            </div>
            <div style="margin-bottom: 12px;">
                <textarea name="message" placeholder="¿En qué podemos ayudarte?" style="width:100%; padding:12px; background:#252525; border:1px solid #333; border-radius:10px; color:white;" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn-primary">ENVIAR</button>
        </form>
    </div>

    <!-- Result Panel -->
    <div id="result-panel">
        <div class="modal-header" style="margin-top: 0; margin-bottom: 15px;">
            <h3>Escaneo Completo</h3>
            <div onclick="closeResult()" style="color: var(--text-secondary); font-size: 12px;">CERRAR</div>
        </div>
        <div id="result-content" class="card">
            <!-- Dynamic Content -->
        </div>
        <button id="save-btn" class="btn-primary" onclick="saveToHistory()">GUARDAR RECHAZADO</button>
    </div>

    <script>
        let lastResult = null;
        let rejectedNotes = JSON.parse(localStorage.getItem('rejected_notes')) || [];

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
            if (id === 'history-modal') renderHistory();
        }

        function closeResult() {
            document.getElementById('result-panel').classList.remove('active');
        }

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 250, height: 250 } };

        function onScanSuccess(decodedText) {
            const isBOB = decodedText.toUpperCase().includes("BOB") || decodedText.includes("|");
            
            lastResult = {
                id: Date.now(),
                status: isBOB ? "VÁLIDO" : "INHABILITADO",
                color: isBOB ? "var(--primary)" : "var(--error)",
                qr: decodedText,
                date: new Date().toLocaleString(),
                reason: isBOB ? "Serie verificada." : "Formato inválido."
            };

            showResult(lastResult);
            if (window.navigator.vibrate) window.navigator.vibrate(100);
        }

        function showResult(result) {
            const content = document.getElementById('result-content');
            content.style.borderLeft = `4px solid ${result.color}`;
            content.innerHTML = `
                <p style="font-size:11px; color:var(--text-secondary);">ESTADO</p>
                <p style="color:${result.color}; font-weight:800; font-size:18px; margin-bottom:12px;">${result.status}</p>
                <p style="font-size:11px; color:var(--text-secondary);">CONTENIDO QR</p>
                <p style="font-size:12px; word-break:break-all;">${result.qr}</p>
            `;
            
            document.getElementById('save-btn').style.display = result.status === "INHABILITADO" ? "block" : "none";
            document.getElementById('result-panel').classList.add('active');
        }

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

        function saveToHistory() {
            rejectedNotes.unshift(lastResult);
            localStorage.setItem('rejected_notes', JSON.stringify(rejectedNotes));
            alert("Guardado.");
            closeResult();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = rejectedNotes.length ? rejectedNotes.map(n => `
                <div class="card" style="border-left: 4px solid var(--error);">
                    <p style="font-weight: 800;">RECHAZADO - ${n.date}</p>
                    <p style="font-size: 12px; color: var(--text-secondary);">${n.qr}</p>
                </div>
            `).join('') : '<p style="text-align:center; padding:40px; color:#666;">Sin registros.</p>';
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
