<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BilleteSeguro BOB</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="app_icon_v20.png">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="BilleteBOB">
    <link rel="apple-touch-icon" href="app_icon_v20.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface-glass: rgba(10, 10, 10, 0.4);
            --text: #ffffff;
            --text-secondary: #a0a0a0;
            --error: #ff4d4d;
            --info: #00f3ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000 url('bg_final.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 185px 20px 20px; 
            z-index: 100;
        }

        #scanner-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 10;
        }

        .scanner-viewbox {
            width: 300px;
            height: 300px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            display: block;
        }

        @keyframes scanSlide {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(300px); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(0); opacity: 0; }
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #00f3ff;
            box-shadow: 0 0 25px #00f3ff;
            z-index: 25;
            animation: scanSlide 2.5s ease-in-out infinite;
        }

        .scan-badge {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            text-align: center;
            width: 280px;
        }

        .scan-badge p {
            color: var(--primary);
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
        }

        .btn-denom {
            background: rgba(0, 243, 255, 0.05);
            color: var(--primary);
            border: 2px solid rgba(0, 243, 255, 0.3);
            padding: 14px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }

        .btn-denom.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
        }

        .navbar {
            height: 90px;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 25px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            cursor: pointer;
            flex: 1;
        }

        .nav-item.active { color: var(--primary); }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            padding: 24px;
            flex-direction: column;
            overflow-y: auto;
        }

        .modal.active { display: flex; }

        .card {
            background: #111;
            border-radius: 15px;
            padding: 15px; border: 1px solid #333; margin-bottom: 15px;
        }

        #result-panel {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #111; padding: 25px 25px 100px;
            border-top: 2px solid var(--primary);
            transform: translateY(100%);
            transition: transform 0.4s;
            z-index: 1500;
        }

        #result-panel.active { transform: translateY(0); }

        .btn-primary {
            background: var(--primary); color: #000; border: none;
            padding: 15px; border-radius: 12px; font-weight: 800; width: 100%;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="series_db.js"></script>
</head>

<body>
    <div class="header"></div>
    <div id="scanner-container">
        <div class="scanner-viewbox">
            <video id="video" playsinline autoplay muted></video>
            <div class="scan-line"></div>
        </div>
        <div id="denom-selector" style="display: flex; gap: 8px; width: 300px; margin: 20px 0;">
            <button class="btn-denom active" onclick="setDenom('auto', this)">AUTO</button>
            <button class="btn-denom" onclick="setDenom('10', this)">10 Bs</button>
            <button class="btn-denom" onclick="setDenom('20', this)">20 Bs</button>
            <button class="btn-denom" onclick="setDenom('50', this)">50 Bs</button>
        </div>
        <div class="scan-badge">
            <p id="status-label">Iniciando v52...</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-item active" onclick="location.reload()">
            <span>ESCANEAR</span>
        </div>
        <div class="nav-item" onclick="toggleModal('history-modal')">
            <span>HISTORIAL</span>
        </div>
        <div class="nav-item" onclick="document.getElementById('ocr-upload').click()">
            <span>SUBIR FOTO</span>
        </div>
        <input type="file" id="ocr-upload" accept="image/*" style="display: none;" onchange="handleOCRUpload(event)">
        <div class="nav-item" onclick="toggleModal('support-modal')">
            <span>APOYO</span>
        </div>
    </nav>

    <div id="history-modal" class="modal">
        <h2 style="margin-bottom: 20px;">Historial</h2>
        <div id="history-list"></div>
        <button onclick="toggleModal('history-modal')" class="btn-primary" style="margin-top: 20px;">CERRAR</button>
    </div>

    <div id="support-modal" class="modal">
        <h2 style="margin-bottom: 20px;">Soporte</h2>
        <div class="card">
            <p style="margin-bottom: 15px;">gamers2asd@gmail.com</p>
            <button onclick="toggleModal('support-modal')" class="btn-primary">CERRAR</button>
        </div>
    </div>

    <div id="result-panel">
        <h3 id="result-status" style="font-size: 24px; margin-bottom: 10px;">ESTADO</h3>
        <p id="result-reason" style="margin-bottom: 20px; color: #ccc;"></p>
        <button onclick="closeResult()" class="btn-primary">CONTINUAR</button>
    </div>

    <script>
        let ocrWorker = null;
        let isProcessing = false;
        let selectedDenom = 'auto';
        let rejectedNotes = JSON.parse(localStorage.getItem('rejected_notes')) || [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); if (id === 'history-modal') renderHistory(); }
        function closeResult() { document.getElementById('result-panel').classList.remove('active'); }
        function setDenom(val, btn) { selectedDenom = val; document.querySelectorAll('.btn-denom').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

        async function initOCR() {
            try {
                document.getElementById('status-label').innerText = "IA CARGANDO...";
                ocrWorker = await Tesseract.createWorker('eng', 1);
                await ocrWorker.setParameters({ tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ', tessedit_pageseg_mode: '7' });
                document.getElementById('status-label').innerText = "APUNTA AL BILLETE";
            } catch (err) {
                document.getElementById('status-label').innerText = "ERROR IA: RECARGA";
            }
        }

        async function startScanner() {
            const video = document.getElementById('video');
            try {
                document.getElementById('status-label').innerText = "CÁMARA...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                requestAnimationFrame(() => processLoop(video, canvas, ctx));
            } catch (err) {
                document.getElementById('status-label').innerText = "ERROR CÁMARA";
            }
        }

        async function processLoop(video, canvas, ctx) {
            if (isProcessing || !ocrWorker) {
                requestAnimationFrame(() => processLoop(video, canvas, ctx));
                return;
            }
            canvas.width = 400; canvas.height = 400;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            isProcessing = true;
            try {
                const { data: { text } } = await ocrWorker.recognize(canvas.toDataURL('image/jpeg', 0.5));
                if (text) parseText(text);
                setTimeout(() => { isProcessing = false; requestAnimationFrame(() => processLoop(video, canvas, ctx)); }, 800);
            } catch (err) {
                isProcessing = false;
                requestAnimationFrame(() => processLoop(video, canvas, ctx));
            }
        }

        function parseText(text) {
            const m = text.match(/\b(\d{8,9})\s*([A-C])\b/i);
            if (m) {
                const res = validateBolivianBill(m[2].toUpperCase(), selectedDenom, m[1]);
                if (res.status === "INHABILITADO") {
                    document.getElementById('result-status').innerText = res.status;
                    document.getElementById('result-status').style.color = res.color;
                    document.getElementById('result-reason').innerText = res.reason;
                    document.getElementById('result-panel').classList.add('active');
                    rejectedNotes.unshift({ reason: res.reason, qr: `OCR: ${m[2].toUpperCase()} ${m[1]}` });
                    localStorage.setItem('rejected_notes', JSON.stringify(rejectedNotes));
                }
            }
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = rejectedNotes.map(n => `<div class="card"><p style="color:red; font-weight:800;">RECHAZADO</p><p>${n.reason}</p><p style="font-size:10px; color:#666;">${n.qr}</p></div>`).join('') || '<p>Vacío</p>';
        }

        async function handleOCRUpload(event) {
            const file = event.target.files[0]; if (!file || !ocrWorker) return;
            const img = new Image(); img.src = URL.createObjectURL(file);
            img.onload = async () => {
                const c = document.createElement('canvas'); c.width = 800; c.height = (img.height/img.width)*800;
                c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
                const { data: { text } } = await ocrWorker.recognize(c);
                parseText(text);
            };
        }

        window.onload = () => { initOCR(); startScanner(); };
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    </script>
</body>
</html>
